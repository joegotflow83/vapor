name: Docs

on:
  push:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Free disk space
      # --all-features builds all ~102 AWS SDK crates at once; the runner's
      # default free space (~14GB on the root partition) isn't enough
      # headroom once rust-cache's tarball is added on top. These
      # preinstalled toolchains are unused here and reclaim ~30GB.
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        df -h /

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: stable

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

    - name: Generate service pages from the GraphQL schema
      # Deliberately not --release: Cargo.toml's [profile.release] sets
      # codegen-units = 1 (tuned for the small curated CD release build),
      # which applied to --all-features (~102 SDK crates) is memory-heavy
      # enough to get the job OOM-killed. The dev profile matches what
      # ci.yml already builds successfully with --all-features.
      run: cargo build --all-features --bin gen-docs && ./target/debug/gen-docs

    - name: Install mdBook
      uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
      with:
        tool: mdbook

    - name: Build book
      run: mdbook build docs

    - name: Setup Pages
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

    - name: Upload artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
      with:
        path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
