name: CD - Continuous Deployment

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      with:
        key: ${{ matrix.target }}

    - name: Build release
      env:
        CARGO_BUILD_JOBS: 2
      run: |
        cargo build --release --all-features --target ${{ matrix.target }}

    - name: Package binary
      shell: bash
      run: |
        if [ "${{ matrix.platform }}" = "windows" ]; then
          # Windows binaries have .exe extension
          7z a "vapor-${{ matrix.platform }}.zip" "target/${{ matrix.target }}/release/vapor.exe"
        else
          # Unix-like systems (Linux, macOS)
          tar -czf "vapor-${{ matrix.platform }}.tar.gz" -C "target/${{ matrix.target }}/release" "vapor"
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: vapor-${{ matrix.platform }}
        path: vapor-${{ matrix.platform }}.*

  release:
    name: Create GitHub Release
    needs: deploy
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Download all artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        pattern: vapor-*
        path: .
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Vapor ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          vapor-linux.tar.gz
          vapor-macos.tar.gz
          vapor-windows.zip
        token: ${{ secrets.GITHUB_TOKEN }}